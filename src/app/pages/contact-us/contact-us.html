<section class="contact-card">
  <div class="contact-panel contact-info">
    <div class="flex flex-1 justify-between f-col">
      <div class="">
        <div class="flex-1 flex items-center gap-2">
          <code class="logo large">
            <span class="key"></span>
          </code>
          <h1>🤝</h1>
          <code class="empty-block"></code>
        </div>
        <br/>
        <h3>Холбоо барих</h3>
        <p class="form-subtitle">Please contact us without any hesitation if you ever face any mistake through this website or giving us your valuable suggestions about the improvement of the services.</p>
      </div>
      <div class="flex f-col">
        <code class="small">
          Имэйл: info@bicheech.mn
        </code>
        <br/>
      </div>
    </div>
  </div>

  <div class="contact-panel b-contact-us-content">
    <form class="form-container" [formGroup]="contactForm" (ngSubmit)="onSubmit()">

      <div class="field">
        <label>Холбоо барих нэр</label>
        <input pInputText formControlName="name" class="w-full" />
      </div>

      <div class="field">
        <label>Цахим шуудан</label>
        <input pInputText formControlName="email" class="w-full" placeholder="email@example.com" />
      </div>

      <div class="field">
        <label>Агуулга</label>
        <textarea
          pTextarea
          rows="4"
          formControlName="content"
          class="w-full">
            </textarea>
      </div>

      <ngx-turnstile
        [siteKey]="siteKey"
        (resolved)="sendCaptchaResponse($event)"
        theme="auto">
      </ngx-turnstile>

      @if(message) {
        <p-message [severity]="message.type" styleClass="w-full mb-3">{{message.message}}</p-message>
      }

      <p-button
        label="Зурвас илгээх"
        icon="pi pi-envelope"
        (onClick)="onSubmit()"
        [disabled]="contactForm.pristine"
      ></p-button>
    </form>

  </div>
</section>
