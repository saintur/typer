@if (blogs$ | async; as blogs) {
  <div class="timeline-wrapper">
    <h1>
      Нийтлэл
<!--      <om-neon-underline></om-neon-underline>-->
    </h1>

    <om-timeline
      [entryGap]="'1rem'"
      [titleMaxWidth]="'15rem'"
      [orientation]="'switch'"
      [gradientColors]="['#ca4bc4', '#88f3f2']"
    >
      @for (blog of blogs; track blog.id) {
        <om-timeline-entry>
          <ng-template #timelineTitle>
            <p class="timeline-title">{{blog.createdAt | date : 'yyyy\nMM.dd'}}</p>
          </ng-template>
          <ng-template #timelineContent>
            <div class="timeline-content">
              <h2>{{blog.title}}</h2>
              <div class="html-content" [innerHTML]="blog.htmlContent"></div>
            </div>
          </ng-template>
        </om-timeline-entry>
      }
    </om-timeline>
  </div>
}
